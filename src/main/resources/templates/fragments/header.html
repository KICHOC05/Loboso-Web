<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="header">
<head th:replace="~{this :: head-meta}"></head>
<body>

<!-- ═══ HEAD META (incluido desde index.html) ═══ -->
<th:block th:fragment="head-meta">
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LOBOSO | Soluciones Gráficas para Negocios y Empresas</title>

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" th:href="@{/img/loboso-logo.jpeg}"/>

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&display=swap" rel="stylesheet"/>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script th:replace="~{fragments/header :: tailwind-config}"></script>

  <!-- Estilos propios -->
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</th:block>

<!-- ═══ TAILWIND CONFIG ═══ -->
<th:block th:fragment="tailwind-config">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary":                "#004e8a",
            "primary-container":      "#0066b2",
            "on-primary":             "#ffffff",
            "on-primary-container":   "#d1e3ff",
            "secondary":              "#286c12",
            "on-secondary":           "#ffffff",
            "secondary-container":    "#a7f389",
            "secondary-fixed":        "#aaf68c",
            "surface":                "#f8f9ff",
            "surface-alt":            "#F8FAFC",
            "surface-dim":            "#d8dae1",
            "surface-variant":        "#e1e2e9",
            "surface-container":      "#eceef5",
            "surface-container-low":  "#f2f3fa",
            "surface-container-high": "#e6e8ef",
            "on-surface":             "#191c21",
            "on-surface-variant":     "#414751",
            "on-background":          "#191c21",
            "background":             "#f8f9ff",
            "inverse-surface":        "#2d3136",
            "outline":                "#717782",
            "outline-variant":        "#c1c7d3",
            "navy-deep":              "#1E3A8A"
          },
          fontFamily: { "hk": ["Hanken Grotesk", "sans-serif"] },
          spacing: {
            "section": "80px",
            "mx-d":    "48px",
            "mx-m":    "16px",
            "cmax":    "1280px"
          }
        }
      }
    }
  </script>
</th:block>

<!-- ═══ NAVBAR ═══ -->
<th:block th:fragment="navbar">
  <header id="site-header" class="fixed top-0 inset-x-0 z-50 bg-on-background/80 backdrop-blur-md">
    <div class="max-w-[1280px] mx-auto px-4 md:px-12 h-20 flex items-center justify-between">

      <!-- Logo -->
      <a href="#inicio" class="flex-shrink-0">
        <img id="logo-img" alt="LOBOSO"
             class="h-20 md:h-24 w-auto brightness-0 invert"
             th:src="@{/img/loboso-logo.jpeg}"/>
      </a>

      <!-- Desktop nav -->
      <nav class="hidden md:flex items-center gap-8">
        <a href="#inicio"    class="nav-a text-[14px] font-semibold text-white/90 border-b-2 border-white/70 pb-0.5">Inicio</a>
        <a href="#servicios" class="nav-a text-[14px] font-semibold text-white/60 hover:text-white/90 transition-colors">Nuestros Servicios</a>
        <a href="#nosotros"  class="nav-a text-[14px] font-semibold text-white/60 hover:text-white/90 transition-colors">Nosotros</a>
        <a href="#galeria"   class="nav-a text-[14px] font-semibold text-white/60 hover:text-white/90 transition-colors">Galería</a>
        <a href="#clientes"  class="nav-a text-[14px] font-semibold text-white/60 hover:text-white/90 transition-colors">Nuestros Clientes</a>
        <a href="#contacto"  class="nav-a text-[14px] font-semibold text-white/60 hover:text-white/90 transition-colors">Contacto</a>
      </nav>

      <div class="flex items-center gap-3">
        <!-- Botón de Login añadido -->
        <a href="/login" class="hidden md:inline-flex bg-transparent border border-white/50 text-white text-[14px] font-semibold px-5 py-2 rounded-lg hover:bg-white/10 transition-all">Iniciar Sesión</a>
        <a href="#contacto" class="btn-blue hidden md:inline-flex bg-primary text-white text-[14px] font-semibold px-5 py-2 rounded-lg">Cotizar</a>
        <!-- Hamburger -->
        <button id="ham-btn" class="md:hidden flex flex-col gap-[5px] p-2 cursor-pointer" aria-label="Menú">
          <span class="ham-line" id="hl1"></span>
          <span class="ham-line" id="hl2"></span>
          <span class="ham-line" id="hl3"></span>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div id="mob-menu" class="md:hidden bg-on-background border-t border-white/10">
      <div class="px-5 py-4 flex flex-col gap-1">
        <a href="#inicio"    class="mob-lnk py-3 text-white/85 text-sm font-medium border-b border-white/8">Inicio</a>
        <a href="#servicios" class="mob-lnk py-3 text-white/85 text-sm font-medium border-b border-white/8">Nuestros Servicios</a>
        <a href="#nosotros"  class="mob-lnk py-3 text-white/85 text-sm font-medium border-b border-white/8">Nosotros</a>
        <a href="#galeria"   class="mob-lnk py-3 text-white/85 text-sm font-medium border-b border-white/8">Galería</a>
        <a href="#clientes"  class="mob-lnk py-3 text-white/85 text-sm font-medium border-b border-white/8">Nuestros Clientes</a>
        <a href="#contacto"  class="mob-lnk py-3 text-white/85 text-sm font-medium border-b border-white/8">Contacto</a>
        <!-- Botón de Login para móvil -->
        <a href="/login"  class="mt-3 bg-transparent border border-white/50 text-white text-center py-3 rounded-lg text-sm font-semibold hover:bg-white/10">Iniciar Sesión</a>
        <a href="#contacto"  class="mt-2 bg-primary text-white text-center py-3 rounded-lg text-sm font-semibold">Cotizar</a>
      </div>
    </div>
  </header>
</th:block>

</body>
</html>
